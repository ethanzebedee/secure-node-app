name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate OpenAPI spec
        run: npm run docs:validate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  docker-smoke:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t secure-node-app:ci .

      - name: Run container
        run: docker run -d --name secure-node-app-ci -p 3000:3000 secure-node-app:ci

      - name: Wait for startup
        run: sleep 5

      - name: Health check
        run: curl -fsS http://localhost:3000/healthz

      - name: Cleanup
        if: always()
        run: docker rm -f secure-node-app-ci
